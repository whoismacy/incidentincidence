name: incident-incidence-actions
on:
  schedule:
    - cron: 0 12 * * 0
    - cron: 0 12 * * 3
  push:
    branches:
      - main

concurrency: 
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  testing:
    name: Running tests on source code
    runs-on: ubuntu-latest
    steps:
      # todo
      - run: echo "Running Tests triggered by ${{github.event_name}} event."

  detekt:
    name: Run detekt
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code 
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Gradle setup
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-includes: | 
            caches
            notifications
          gradle-home-cache-cleanup: true

      - name: Grant gradle permission
        run: chmod +x gradlew

      - name: Run Detekt
        run: ./gradlew :app:detekt --no--daemon --parallel --configuration-cache --build-cache --stacktrace

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: |
            app/build/reports/detekt/detekt.html
            app/build/reports/detekt.html
            **/build/reports/detekt*/**/*.html
          if-no-files-found: warn
